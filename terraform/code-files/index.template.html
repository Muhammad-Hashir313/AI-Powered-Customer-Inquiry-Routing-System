<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Inquiry Form</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    padding: 25px;
    width: 400px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  h2 { margin-bottom: 20px; }

  input, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }

  textarea {
    resize: none;
    height: 100px;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  button:disabled {
    background: #93c5fd;
    cursor: not-allowed;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid white;
    border-top: 2px solid transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: none;
  }

  @keyframes spin {
    100% { transform: rotate(360deg); }
  }

  .msg {
    margin-top: 10px;
    font-size: 14px;
  }

  .success { color: green; }
  .error { color: red; }
</style>
</head>

<body>

<div class="card">
  <h2>Customer Inquiry</h2>

  <form id="form">

    <input id="name" type="text" placeholder="Name"
      required minlength="3" maxlength="50"
      pattern="[A-Za-z ]+"
    />

    <input id="email" type="email" placeholder="Email"
      required maxlength="80"
    />

    <textarea id="inquiry" placeholder="Your inquiry"
      required minlength="10" maxlength="300"
    ></textarea>

    <button id="btn" type="submit">
      <div class="spinner" id="spinner"></div>
      <span id="text">Submit</span>
    </button>

    <div class="msg success" id="success">Inquiry submitted successfully!</div>
    <div class="msg error" id="error">Request failed. Try again.</div>

  </form>
</div>

<script>
const API_URL = "__API_URL__";

const form = document.getElementById("form");
const btn = document.getElementById("btn");
const spinner = document.getElementById("spinner");
const text = document.getElementById("text");

const success = document.getElementById("success");
const error = document.getElementById("error");

const inputs = form.querySelectorAll("input, textarea");

function setLoading(state) {
  inputs.forEach(i => i.disabled = state);
  btn.disabled = state;

  spinner.style.display = state ? "block" : "none";
  text.textContent = state ? "Submitting..." : "Submit";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  success.style.display = "none";
  error.style.display = "none";

  setLoading(true);

  const payload = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    inquiry: document.getElementById("inquiry").value.trim()
  };

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error();

    success.style.display = "block";
    form.reset();

  } catch (err) {
    error.style.display = "block";
  } finally {
    setLoading(false);
  }
});
</script>

</body>
</html>
